name: Publicar migraciones de Supabase

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    name: Aplicar migraciones en producción
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1

      - name: Enlazar proyecto de Supabase
        run: |
          for attempt in 1 2 3; do
            if supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"; then
              exit 0
            fi
            echo "El enlace con Supabase falló (intento $attempt de 3)."
            sleep 5
          done
          exit 1

      - name: Aplicar migraciones pendientes
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
